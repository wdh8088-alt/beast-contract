<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>幻兽契约 - 僵尸闯关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;overflow-x:hidden}
.page{max-width:480px;margin:0 auto;padding-bottom:80px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#667eea,#764ba2);position:sticky;top:0;z-index:100}
.header .logo{font-size:20px;font-weight:bold}
.header .stats{display:flex;gap:12px;font-size:14px}
.header .stat{background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:12px}

/* Tab Bar */
.tab-bar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;background:#16213e}
.tab{flex:1;min-width:calc(25% - 6px);text-align:center;padding:8px 4px;border-radius:10px;font-size:12px;cursor:pointer;background:#0f3460;color:#aaa;transition:all .2s}
.tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.tab:active{transform:scale(0.95)}

/* Content */
.content{padding:12px}

/* Pet Grid */
.pet-grid{display:flex;flex-wrap:wrap;gap:10px}
.pet-card{width:calc(50% - 5px);background:#16213e;border-radius:12px;padding:10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s}
.pet-card:active{transform:scale(0.97)}
.pet-card.sel{border-color:#667eea;box-shadow:0 0 12px rgba(102,126,234,0.5)}
.pet-card .img{font-size:48px;display:block;margin-bottom:4px}
.pet-card .name{font-size:14px;font-weight:bold;display:block}
.pet-card .info{font-size:11px;color:#888;display:block}
.pet-card .happy{font-size:11px;color:#f39c12}

/* Rarity borders */
.r-G0{border-left:4px solid #FFD700}
.r-S-plus{border-left:4px solid #FF00FF}
.r-SSR,.r-SR{border-left:4px solid #9B59B6}
.r-SR{border-left-color:#3498DB}
.r-R{border-left:4px solid #2ECC71}
.r-N{border-left:4px solid #555}

/* Sections */
.section-title{font-size:16px;font-weight:bold;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #333}

/* Hatch */
.hatch-area{text-align:center;padding:30px 0}
.egg-btn{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#ffecd2,#fcb69f);border:none;font-size:60px;cursor:pointer;display:block;margin:0 auto;box-shadow:0 4px 16px rgba(252,182,159,0.4);transition:transform .1s}
.egg-btn:active{transform:scale(0.92)}
.egg-btn.shaking{animation:shake .3s infinite}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
.hatch-cost{font-size:13px;color:#888;margin-top:8px}
.rarity-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px;background:#0f3460;border-radius:10px;margin-bottom:12px}
.rarity-chip{padding:4px 10px;border-radius:6px;font-size:11px;color:#fff}
.result-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:200}
.result-box{background:#16213e;border-radius:16px;padding:24px;text-align:center;width:80%}
.result-name{font-size:22px;font-weight:bold;display:block;margin-bottom:4px}
.result-rarity{font-size:14px;font-weight:bold;display:block;margin-bottom:8px}
.result-skill{font-size:13px;color:#e67e22;display:block;margin-bottom:4px}
.result-close{margin-top:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px}

/* Dungeon */
.battle-field{position:relative;width:100%;height:280px;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:12px;overflow:hidden;margin-bottom:10px}
.pet-sprite{position:absolute;transition:left .25s ease;text-align:center}
.pet-circle{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;box-shadow:0 4px 12px rgba(102,126,234,0.5)}
.pet-sprite.attacking .pet-circle{transform:scale(1.2);box-shadow:0 4px 20px rgba(102,126,234,0.8)}
.zombie-sprite{position:absolute;transition:all .25s ease;text-align:center}
.zombie-circle{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#6B8E23,#556B2F);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold}
.zombie-sprite.hit .zombie-circle{background:linear-gradient(135deg,#FF4444,#FF0000)!important;transform:scale(1.25)}
.zombie-sprite.dead .zombie-circle{opacity:0.2;transform:rotate(90deg) scale(0.5)}
.hp-bar{width:52px;height:6px;background:#333;border-radius:3px;margin-top:2px;overflow:hidden}
.hp-fill{height:100%;background:#E74C3C;border-radius:3px;transition:width .2s}
.hp-fill.pet-hp{background:#2ECC71}
.hp-text{font-size:10px;color:#ccc;text-align:center;display:block}
.wave-bar{display:flex;justify-content:space-between;padding:6px 10px;background:#0f3460;border-radius:8px;font-size:12px;color:#aaa;margin-bottom:8px}
.skill-btn{width:100%;padding:12px;background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;margin-bottom:8px}
.skill-btn:disabled{background:#555;color:#888}
.battle-log{max-height:120px;overflow-y:auto;background:#0f3460;border-radius:8px;padding:8px}
.log-line{font-size:11px;color:#888;padding:2px 0;display:block}
.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;font-weight:bold}
.reward-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:200}
.reward-box{background:#16213e;border-radius:16px;padding:24px;text-align:center;width:80%}
.reward-title{font-size:22px;font-weight:bold;display:block;margin-bottom:12px}
.reward-item{display:block;font-size:14px;margin:6px 0}
.reward-equip{padding:10px;border-radius:8px;border:3px solid;margin:8px 0;text-align:left}
.reward-equip span{display:block;font-size:12px}
.reward-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px;margin-top:10px}

/* Equipment */
.sub-tabs{display:flex;gap:8px;margin-bottom:12px}
.sub-tab{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:13px;background:#0f3460;color:#888;cursor:pointer}
.sub-tab.active{background:#667eea;color:#fff}
.equip-item{display:flex;align-items:center;justify-content:space-between;background:#16213e;padding:12px;border-radius:10px;margin-bottom:8px}
.equip-info{flex:1}
.equip-name{font-size:14px;font-weight:bold;display:block}
.equip-tier{font-size:11px;color:#888;display:block}
.equip-bonus{font-size:13px;color:#e67e22;font-weight:bold;display:block}
.equip-btn{background:#667eea;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.equipped-pet{background:#16213e;padding:12px;border-radius:10px;margin-bottom:8px}
.equipped-name{font-size:14px;font-weight:bold;display:block;margin-bottom:6px}
.equipped-slot{padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:12px;border-left:4px solid;background:#0f3460}
.unequip{color:#e74c3c;cursor:pointer;margin-left:10px;font-size:11px}
.legend-row{display:flex;justify-content:center;gap:14px;padding:10px;background:#0f3460;border-radius:8px;margin-top:10px;font-size:12px}

/* Fashion */
.fashion-item{display:flex;align-items:center;gap:10px;background:#16213e;padding:12px;border-radius:10px;margin-bottom:8px}
.fashion-icon{font-size:36px;width:50px;text-align:center}
.fashion-info{flex:1}
.fashion-name{font-size:14px;font-weight:bold;display:block}
.fashion-desc{font-size:11px;color:#888;display:block}
.fashion-bonus{font-size:12px;color:#e67e22;font-weight:bold;display:block}
.fashion-frag{font-size:11px;color:#9B59B6;display:block}
.synth-btn{background:#555;color:#999;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.synth-btn.ready{background:linear-gradient(135deg,#9B59B6,#8E44AD);color:#fff}
.frag-item{display:flex;justify-content:space-between;padding:10px 12px;background:#16213e;border-radius:8px;margin-bottom:6px;font-size:13px}

/* Shop */
.shop-category{margin-bottom:16px}
.shop-title{font-size:14px;font-weight:bold;margin-bottom:8px;padding-left:8px;border-left:4px solid #667eea}
.shop-item{background:#16213e;padding:14px;border-radius:10px;margin-bottom:8px;cursor:pointer}
.shop-item:active{background:#1a2744}
.shop-name{font-size:14px;font-weight:bold;display:block}
.shop-desc{font-size:11px;color:#888;display:block;margin:2px 0}
.shop-price{font-size:13px;color:#e67e22;font-weight:bold}

/* Tasks */
.task-item{display:flex;align-items:center;justify-content:space-between;background:#16213e;padding:14px;border-radius:10px;margin-bottom:8px}
.task-name{font-size:14px;font-weight:bold;display:block}
.task-desc{font-size:11px;color:#888;display:block}
.task-reward{font-size:12px;color:#e67e22;display:block;margin-top:2px}
.task-btn{background:#667eea;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.task-btn.done{background:#444;color:#888}

/* Care */
.care-panel{background:#16213e;border-radius:12px;padding:16px;margin-bottom:12px}
.care-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.care-img{font-size:48px}
.care-name{font-size:16px;font-weight:bold}
.care-power{font-size:12px;color:#aaa}
.status-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.status-bar{flex:1;height:8px;background:#333;border-radius:4px;overflow:hidden}
.status-fill{height:100%;border-radius:4px;transition:width .3s}
.hunger-fill{background:linear-gradient(90deg,#f39c12,#e67e22)}
.clean-fill{background:linear-gradient(90deg,#3498db,#2980b9)}
.happy-fill{background:linear-gradient(90deg,#2ecc71,#27ae60)}
.care-btns{display:flex;gap:8px;margin-top:10px}
.care-btn{flex:1;padding:10px;background:#667eea;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.care-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.care-pet{width:80px;text-align:center;background:#0f3460;padding:8px;border-radius:8px;cursor:pointer;flex-shrink:0;font-size:11px}
.care-pet.sel{background:#667eea}

/* Empty */
.empty{text-align:center;color:#555;padding:40px 0;font-size:14px}

/* Filter */
.filter-bar{display:flex;gap:6px;margin-bottom:12px}
.filter-btn{flex:1;text-align:center;padding:6px;border-radius:8px;font-size:12px;background:#0f3460;color:#888;cursor:pointer}
.filter-btn.active{background:#667eea;color:#fff}
</style>
</head>

// ===== HELPERS =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function randRarity() {
  const total = Object.values(RARITY).reduce((s,v)=>s+v.w,0);
  let r = Math.random()*total;
  for(const [k,v] of Object.entries(RARITY)){r-=v.w;if(r<=0)return k;}
  return 'N';
}
function hatchPet(r) {
  const pool = PETS.filter(p=>p.rarity===r);
  const base = pool[Math.floor(Math.random()*pool.length)]||PETS.find(p=>p.rarity==='N');
  return {...base,uid:uid(),level:1,power:base.basePower+Math.floor(Math.random()*20),hunger:100,clean:100,happy:100,equip:{weapon:null,armor:null,accessory:null},fashion:null};
}
function calcPower(pet) {
  let p = pet.power||0;
  if(pet.equip) SLOTS.forEach(s=>{if(pet.equip[s])p+=pet.equip[s].b||0;});
  if(pet.fashion){const f=FASHIONS.find(x=>x.id===pet.fashion);if(f)p+=f.pb||0;}
  p=Math.floor(p*(1+((pet.happy||100)-50)*0.004));
  return p;
}
function save() { localStorage.setItem('bc_data',JSON.stringify(state)); }
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('bc_data')||'null');
    if(d){Object.assign(state,d);}
  } catch(e){}
}
function getWaves(stage) {
  const waves=[];
  const count=Math.min(3,1+Math.floor(stage/5));
  for(let w=0;w<count;w++){
    const wave=[];
    const num=2+Math.floor(stage/3)+w;
    for(let i=0;i<num;i++){
      let zi;
      if(stage<3)zi=0;
      else if(stage<6)zi=Math.floor(Math.random()*2);
      else if(stage<10)zi=Math.floor(Math.random()*4);
      else zi=Math.floor(Math.random()*5);
      const z=ZOMBIE[zi];
      const hpM=1+(stage-1)*0.3;
      const atkM=1+(stage-1)*0.2;
      wave.push({...z,uid:uid(),maxHp:Math.floor(z.hp*hpM),hp:Math.floor(z.hp*hpM),atk:Math.floor(z.atk*atkM),x:200+i*30,y:50+(i%3)*55,hit:false,dead:false});
    }
    waves.push(wave);
  }
  if(stage%5===0&&stage>0){
    const boss=ZOMBIE[5];
    const hpM=1+(stage-1)*0.5;
    waves[waves.length-1].push({...boss,uid:uid(),maxHp:Math.floor(boss.hp*hpM),hp:Math.floor(boss.hp*hpM),atk:Math.floor(boss.atk*hpM),x:260,y:80,hit:false,dead:false});
  }
  return waves;
}
function dropEquip(stage) {
  const bonus=Math.min(stage*2,30);
  let roll=Math.random()*100,acc=0;
  let ti=0;
  for(let i=0;i<EQUIP_TIERS.length;i++){
    const rate=i<2?EQUIP_TIERS[i].r-bonus/2:i<3?EQUIP_TIERS[i].r+bonus/4:i<4?EQUIP_TIERS[i].r+bonus/4:EQUIP_TIERS[i].r+bonus/6;
    acc+=Math.max(rate,1);
    if(roll<acc){ti=i;break;}
  }
  const t=EQUIP_TIERS[ti];
  const slot=SLOTS[Math.floor(Math.random()*3)];
  return {uid:uid(),name:PREFIXES[slot][ti],slot,t:t.t,n:t.n,c:t.c,b:t.b+Math.floor(Math.random()*t.b*0.3),stage};
}

// ===== EVENTS =====
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click',e=>{
      const action=el.dataset.action;
      const uid=el.dataset.uid;
      const slot=el.dataset.slot;
      const fid=el.dataset.id;
      const filter=el.dataset.filter;
      const tab=el.dataset.tab;

      switch(action){
        case'detail':showPetDetail(uid);break;
        case'selDungeon':state.dungeonPet=uid;render();break;
        case'startDungeon':startDungeon();break;
        case'useSkill':useSkill();break;
        case'closeReward':closeReward();break;
        case'equipTab':state.equipTab=tab;render();break;
        case'fashionTab':state.fashionTab=tab;render();break;
        case'equipItem':doEquipItem(uid);break;
        case'unequip':doUnequip(uid,slot);break;
        case'synthFashion':doSynthFashion(fid);break;
        case'buy':doBuy(el.dataset.id);break;
        case'claimTask':doClaimTask(parseInt(el.dataset.id));break;
        case'feedCare':doCareAction('hunger',30);break;
        case'cleanCare':doCareAction('clean',30);break;
        case'playCare':doCareAction('happy',30);break;
        case'selCare':state.selectedCare=state.pets.find(p=>p.uid===uid);render();break;
      }
    });
  });

  // Hatch button
  const hatchBtn=document.getElementById('hatchBtn');
  if(hatchBtn){
    hatchBtn.addEventListener('click',()=>{
      if(state.pg<100){alert('PG币不足！');return;}
      state.pg-=100;
      const r=randRarity();
      const pet=hatchPet(r);
      state.pets.push(pet);
      save();
      hatchBtn.classList.add('shaking');
      setTimeout(()=>{
        hatchBtn.classList.remove('shaking');
        showHatchResult(pet);
      },500);
    });
  }
}

        <button class="result-close" onclick="render()">收下</button>
      </div>
    </div>
  `;
}

function showPetDetail(uid) {
  const pet=state.pets.find(p=>p.uid===uid);
  if(!pet)return;
  const tp=calcPower(pet);
  let equipInfo='';
  SLOTS.forEach(s=>{
    if(pet.equip&&pet.equip[s])equipInfo+=`\n${SLOT_NAMES[s]}：${pet.equip[s].name}(+${pet.equip[s].b})`;
  });
  if(pet.fashion){
    const f=FASHIONS.find(x=>x.id===pet.fashion);
    if(f)equipInfo+=`\n时装：${f.name}(+${f.pb})`;
  }
  alert(`${pet.name}\n${RARITY[pet.rarity].text} | ${pet.profession}\n基础战力：${pet.power}\n总战力：${tp}${equipInfo}\n等级：Lv.${pet.level||1}`);
}

// ===== DUNGEON =====
function startDungeon() {
  const pet=state.pets.find(p=>p.uid===state.dungeonPet);
  if(!pet){alert('请选择宠物');return;}
  if((pet.hunger||100)<20){alert('宠物太饿了，先喂食！');return;}
  _dungeonPet=pet;
  _dungeonPower=calcPower(pet);
  _waves=getWaves(state.stage);
  _waveIdx=0;
  _dungeonZombies=JSON.parse(JSON.stringify(_waves[0]));
  state.dungeonActive=true;
  state.dungeonPetHp=100+Math.floor(_dungeonPower*0.5);
  state.dungeonPetMaxHp=100+Math.floor(_dungeonPower*0.5);
  state.dungeonLog=['第'+state.stage+'关 - 波次1/'+_waves.length];
  state.petX=40;
  state.petY=100;
  _skillCd=0;
  save();
  render();
  _dungeonTimer=setInterval(dungeonAttack,1500);
  _zombieTimer=setInterval(zombieMove,2000);
}

function dungeonAttack() {
  if(!state.dungeonActive)return;
  const alive=_dungeonZombies.filter(z=>!z.dead);
  if(!alive.length)return;
  const target=alive[Math.floor(Math.random()*alive.length)];
  const dmg=Math.floor(_dungeonPower*(0.6+Math.random()*0.3));
  target.hp-=dmg;
  target.hit=true;
  const log=[...(state.dungeonLog||[]),_dungeonPet.name+' 攻击 '+target.name+' -'+dmg];
  if(target.hp<=0){target.hp=0;target.dead=true;log.push(target.name+' 被击败！');}
  state.petX=80;
  state.dungeonLog=log;
  render();
  setTimeout(()=>{state.petX=40;render();},250);
  setTimeout(()=>{_dungeonZombies=_dungeonZombies.map(z=>({...z,hit:false}));render();},300);
  setTimeout(checkWave,500);
}

function useSkill() {
  if(_skillCd>0||!state.dungeonActive)return;
  const pet=_dungeonPet;
  const dmg=Math.floor(_dungeonPower*pet.skillDmg*(0.8+Math.random()*0.4));
  _dungeonZombies=_dungeonZombies.map(z=>{
    if(z.dead)return z;
    const nh=z.hp-dmg;
    return {...z,hp:nh<=0?0:nh,hit:nh<=0?false:true,dead:nh<=0};
  });
  const log=[...(state.dungeonLog||[]),pet.name+' 释放 '+pet.skill+'！全屏 -'+dmg+'！'];
  state.petX=120;
  _skillCd=5;
  state.dungeonLog=log;
  render();
  const cd=setInterval(()=>{
    _skillCd--;
    const btn=document.getElementById('skillBtn');
    if(btn)btn.textContent=_skillCd>0?'⏳ 冷却'+_skillCd+'s':'🔥 '+pet.skill;
    if(_skillCd<=0)clearInterval(cd);
  },1000);
  setTimeout(()=>{state.petX=40;render();},300);
  setTimeout(()=>{_dungeonZombies=_dungeonZombies.map(z=>({...z,hit:false}));render();},350);
  setTimeout(checkWave,600);
}

function zombieMove() {
  if(!state.dungeonActive)return;
  let petHp=state.dungeonPetHp;
  const log=[...(state.dungeonLog||'')];
  _dungeonZombies=_dungeonZombies.map(z=>{
    if(z.dead)return z;
    const nx=z.x-(z.speed||1)*12;
    if(nx<=60){
      petHp-=z.atk;
      log.push(z.name+' 攻击！-'+z.atk);
      return {...z,x:220+Math.random()*30};
    }
    return {...z,x:nx};
  });
  if(petHp<=0){
    petHp=0;
    log.push('宠物倒下了...');
    state.dungeonLog=log;
    state.dungeonPetHp=0;
    clearInterval(_dungeonTimer);
    clearInterval(_zombieTimer);
    state.dungeonActive=false;
    render();
    setTimeout(()=>alert('闯关失败，下次再来！'),300);
    return;
  }
  state.dungeonZombies=_dungeonZombies;
  state.dungeonPetHp=petHp;
  state.dungeonLog=log;
  render();
}

function checkWave() {
  if(!state.dungeonActive)return;
  if(_dungeonZombies.every(z=>z.dead)){
    _waveIdx++;
    if(_waveIdx<_waves.length){
      _dungeonZombies=JSON.parse(JSON.stringify(_waves[_waveIdx]));
      state.dungeonLog=[...(state.dungeonLog||[]),'波次'+(_waveIdx+1)+'/'+_waves.length+'！'];
      render();
    }else{
      clearInterval(_dungeonTimer);
      clearInterval(_zombieTimer);
      state.dungeonActive=false;
      dungeonVictory();
    }
  }
}

function dungeonVictory() {
  const stage=state.stage;
  const pgR=30+stage*20;
  const equip=dropEquip(stage);
  state.equipment.push(equip);
  let frag=null;
  if(Math.random()<0.2){
    const fi=Math.floor(Math.random()*FASHIONS.length);
    frag=FASHIONS[fi].id;
    state.fragments[frag]=(state.fragments[frag]||0)+1;
  }
  state.rewardData={pg:pgR,equip,frag};
  state.pg+=pgR;
  state.stage=stage+1;
  // Consume hunger
  state.pets=state.pets.map(p=>{
    if(p.uid===_dungeonPet.uid)return{...p,hunger:Math.max(0,(p.hunger||100)-15)};
    return p;
  });
  save();
  render();
}

function closeReward() {
  state.rewardData=null;
  render();
}

// ===== EQUIPMENT =====
function doEquipItem(eqUid) {
  const eq=state.equipment.find(e=>e.uid===eqUid);
  if(!eq)return;
  if(!state.pets.length){alert('没有宠物');return;}
  const names=state.pets.map(p=>p.name);
  const idx=prompt('选择宠物(编号):\n'+names.map((n,i)=>i+': '+n).join('\n'));
  if(idx===null)return;
  const i=parseInt(idx);
  if(i<0||i>=state.pets.length){alert('无效选择');return;}
  state.equipment=state.equipment.filter(e=>e.uid!==eqUid);
  state.pets[i].equip=state.pets[i].equip||{weapon:null,armor:null,accessory:null};
  state.pets[i].equip[eq.slot]=eq;
  save();
  render();
  alert('装备成功！');
}

function doUnequip(pUid,slot) {
  const pet=state.pets.find(p=>p.uid===pUid);
  if(!pet||!pet.equip||!pet.equip[slot])return;
  const old=pet.equip[slot];
  state.equipment.push(old);
  pet.equip[slot]=null;
  save();
  render();
}

// ===== FASHION =====
function doSynthFashion(fid) {
  const f=FASHIONS.find(x=>x.id===fid);
  if(!f)return;
  if((state.fragments[fid]||0)<f.frag){alert('碎片不足');return;}
  if(!state.pets.length){alert('没有宠物');return;}
  const names=state.pets.map(p=>p.name);
  const idx=prompt('选择宠物(编号):\n'+names.map((n,i)=>i+': '+n).join('\n'));
  if(idx===null)return;
  const i=parseInt(idx);
  if(i<0||i>=state.pets.length){alert('无效选择');return;}
  state.fragments[fid]-=f.frag;
  state.pets[i].fashion=fid;
  if(!state.fashions.includes(fid))state.fashions.push(fid);
  save();
  render();
  alert('时装合成成功！');
}

// ===== SHOP =====
function doBuy(id) {
  const item=SHOP.find(s=>s.id===id);
  if(!item){return;}
  if(state.pg<item.price){alert('PG币不足！');return;}
  state.pg-=item.price;
  if(item.type==='egg'){
    const r=item.rarity||randRarity();
    const pet=hatchPet(r);
    pet.rarity=r;
    state.pets.push(pet);
    save();
    render();
    showHatchResult(pet);
  }else if(item.type==='food'||item.type==='clean'||item.type==='toy'){
    if(!state.pets.length){state.pg+=item.price;alert('没有宠物');render();return;}
    const names=state.pets.map((p,i)=>i+': '+p.name);
    const idx=prompt('选择宠物(编号):\n'+names.join('\n'));
    if(idx===null){state.pg+=item.price;render();return;}
    const i=parseInt(idx);
    if(i<0||i>=state.pets.length){state.pg+=item.price;render();return;}
    if(item.type==='food'){
      state.pets[i].hunger=Math.min(100,(state.pets[i].hunger||100)+(item.h||0));
      state.pets[i].happy=Math.min(100,(state.pets[i].happy||100)+(item.hp||0));
    }else if(item.type==='clean'){
      state.pets[i].clean=Math.min(100,(state.pets[i].clean||100)+(item.c||0));
      state.pets[i].happy=Math.min(100,(state.pets[i].happy||100)+(item.hp||0));
    }else if(item.type==='toy'){
      state.pets[i].happy=Math.min(100,(state.pets[i].happy||100)+(item.hp||0));
    }
    save();
    render();
    alert('使用成功！');
  }else if(item.type==='all'){
    state.pets=state.pets.map(p=>{
      let hp=p.hunger||100,cl=p.clean||100,ha=p.happy||100;
      if(item.ah)hp=Math.min(100,hp+item.ah);
      if(item.ac)cl=Math.min(100,cl+item.ac);
      if(item.ahp)ha=Math.min(100,ha+item.ahp);
      return{...p,hunger:hp,clean:cl,happy:ha};
    });
    save();
    render();
    alert('使用成功！');
  }
}

// ===== TASKS =====
function doClaimTask(id) {
  const t=state.tasks.find(t=>t.id===id);
  if(!t||t.c)return;
  t.c=true;
  state.pg+=t.r;
  save();
  render();
  alert('领取成功！+'+t.r+' PG');
}

// ===== CARE =====
function doCareAction(attr,val) {
  const sel=state.selectedCare||state.pets[0];
  if(!sel)return;
  const pet=state.pets.find(p=>p.uid===sel.uid);
  if(!pet)return;
  pet[attr]=Math.min(100,(pet[attr]||100)+val);
  state.selectedCare=pet;
  save();
  render();
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(el=>{
  el.addEventListener('click',()=>{
    state.filter=el.dataset.filter;
    render();
  });
});
</script>
