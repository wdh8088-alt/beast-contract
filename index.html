<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>幻兽契约 - 僵尸闯关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh}
.page{max-width:480px;margin:0 auto;padding-bottom:80px}

/* Login Screen */
.login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
.login-logo{font-size:64px;margin-bottom:10px}
.login-title{font-size:28px;font-weight:bold;margin-bottom:4px}
.login-sub{font-size:14px;color:#888;margin-bottom:40px}
.login-btn{width:80%;max-width:300px;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;margin-bottom:12px}
.login-btn:active{transform:scale(0.97)}
.login-hint{font-size:12px;color:#666;margin-top:10px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#667eea,#764ba2);position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:bold}
.stats{display:flex;gap:10px}
.stat{background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:12px;font-size:13px}

/* Tab Bar */
.tab-bar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;background:#16213e}
.tab{flex:1;min-width:calc(25% - 6px);text-align:center;padding:8px 2px;border-radius:10px;font-size:11px;cursor:pointer;background:#0f3460;color:#aaa;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}

/* Content */
.content{padding:12px}
.section-title{font-size:16px;font-weight:bold;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #333}
.empty{text-align:center;color:#555;padding:40px 0;font-size:14px}

/* Pet Grid */
.pet-grid{display:flex;flex-wrap:wrap;gap:10px}
.pet-card{width:calc(50% - 5px);background:#16213e;border-radius:12px;padding:10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.pet-card:active{transform:scale(0.97)}
.pet-card.sel{border-color:#667eea;box-shadow:0 0 12px rgba(102,126,234,0.5)}
.pet-img{font-size:48px;display:block;margin-bottom:4px}
.pet-name{font-size:14px;font-weight:bold;display:block}
.pet-info{font-size:11px;color:#888;display:block}
.pet-happy{font-size:11px;color:#f39c12}

/* Rarity */
.r-G0{border-left:4px solid #FFD700}
.r-S-plus{border-left:4px solid #FF00FF}
.r-SR{border-left:4px solid #3498DB}
.r-SSR{border-left:4px solid #9B59B6}
.r-R{border-left:4px solid #2ECC71}
.r-N{border-left:4px solid #555}

/* Filter */
.filter-bar{display:flex;gap:6px;margin-bottom:12px}
.filter-btn{flex:1;text-align:center;padding:6px;border-radius:8px;font-size:12px;background:#0f3460;color:#888;cursor:pointer;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:#667eea;color:#fff}

/* Hatch */
.rarity-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px;background:#0f3460;border-radius:10px;margin-bottom:12px}
.chip{padding:4px 10px;border-radius:6px;font-size:11px;color:#fff}
.hatch-area{text-align:center;padding:30px 0}
.egg-btn{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#ffecd2,#fcb69f);border:none;font-size:60px;cursor:pointer;display:block;margin:0 auto;box-shadow:0 4px 16px rgba(252,182,159,0.4)}
.egg-cost{font-size:13px;color:#888;margin-top:8px}
.result-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:200}
.result-box{background:#16213e;border-radius:16px;padding:24px;text-align:center;width:80%}
.result-name{font-size:22px;font-weight:bold;display:block;margin-bottom:4px}
.result-rarity{font-size:14px;font-weight:bold;display:block;margin-bottom:6px}
.result-skill{font-size:13px;color:#e67e22;display:block}
.result-btn{margin-top:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px}

/* Dungeon */
.battle-field{position:relative;width:100%;height:280px;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:12px;overflow:hidden;margin-bottom:10px}
.pet-sprite{position:absolute;transition:left .25s ease;text-align:center;z-index:10}
.pet-circle{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold}
.pet-sprite.atk .pet-circle{transform:scale(1.2)}
.zombie-sprite{position:absolute;transition:all .25s ease;text-align:center;z-index:5}
.zombie-circle{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#6B8E23,#556B2F);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold}
.zombie-sprite.hit .zombie-circle{background:linear-gradient(135deg,#FF4444,#FF0000)!important;transform:scale(1.2)}
.zombie-sprite.dead .zombie-circle{opacity:0.2;transform:rotate(90deg) scale(0.5)}
.hp-bar{width:52px;height:6px;background:#333;border-radius:3px;margin-top:2px;overflow:hidden}
.hp-fill{height:100%;background:#E74C3C;border-radius:3px;transition:width .2s}
.hp-fill.green{background:#2ECC71}
.hp-text{font-size:10px;color:#ccc;text-align:center;display:block}
.wave-bar{display:flex;justify-content:space-between;padding:6px 10px;background:#0f3460;border-radius:8px;font-size:12px;color:#aaa;margin-bottom:8px}
.skill-btn{width:100%;padding:12px;background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;margin-bottom:8px;-webkit-tap-highlight-color:transparent}
.skill-btn:disabled{background:#555;color:#888}
.battle-log{max-height:120px;overflow-y:auto;background:#0f3460;border-radius:8px;padding:8px}
.log-line{font-size:11px;color:#888;padding:2px 0;display:block}
.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;font-weight:bold;-webkit-tap-highlight-color:transparent}
.reward-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:200}
.reward-box{background:#16213e;border-radius:16px;padding:24px;text-align:center;width:80%}
.reward-title{font-size:22px;font-weight:bold;display:block;margin-bottom:12px}
.reward-item{display:block;font-size:14px;margin:6px 0}
.reward-eq{padding:10px;border-radius:8px;border:3px solid;margin:8px 0;text-align:left}
.reward-eq span{display:block;font-size:12px}
.reward-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px;margin-top:10px}

/* Equipment */
.sub-tabs{display:flex;gap:8px;margin-bottom:12px}
.sub-tab{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:13px;background:#0f3460;color:#888;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sub-tab.active{background:#667eea;color:#fff}
.equip-item{display:flex;align-items:center;justify-content:space-between;background:#16213e;padding:12px;border-radius:10px;margin-bottom:8px}
.eq-info{flex:1}
.eq-name{font-size:14px;font-weight:bold;display:block}
.eq-tier{font-size:11px;color:#888;display:block}
.eq-bonus{font-size:13px;color:#e67e22;font-weight:bold;display:block}
.eq-btn{background:#667eea;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.epet{background:#16213e;padding:12px;border-radius:10px;margin-bottom:8px}
.epet-name{font-size:14px;font-weight:bold;display:block;margin-bottom:6px}
.epet-slot{padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:12px;border-left:4px solid;background:#0f3460}
.epet-unequip{color:#e74c3c;cursor:pointer;margin-left:10px;font-size:11px}
.legend-row{display:flex;justify-content:center;gap:14px;padding:10px;background:#0f3460;border-radius:8px;margin-top:10px;font-size:12px}

/* Fashion */
.fashion-item{display:flex;align-items:center;gap:10px;background:#16213e;padding:12px;border-radius:10px;margin-bottom:8px}
.fashion-icon{font-size:36px;width:50px;text-align:center}
.fashion-info{flex:1}
.fashion-name{font-size:14px;font-weight:bold;display:block}
.fashion-desc{font-size:11px;color:#888;display:block}
.fashion-bonus{font-size:12px;color:#e67e22;font-weight:bold;display:block}
.fashion-frag{font-size:11px;color:#9B59B6;display:block}
.synth-btn{background:#555;color:#999;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.synth-btn.ready{background:linear-gradient(135deg,#9B59B6,#8E44AD);color:#fff}
.frag-item{display:flex;justify-content:space-between;padding:10px 12px;background:#16213e;border-radius:8px;margin-bottom:6px;font-size:13px}

/* Shop */
.shop-cat{margin-bottom:16px}
.shop-title{font-size:14px;font-weight:bold;margin-bottom:8px;padding-left:8px;border-left:4px solid #667eea}
.shop-item{background:#16213e;padding:14px;border-radius:10px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.shop-item:active{background:#1a2744}
.shop-name{font-size:14px;font-weight:bold;display:block}
.shop-desc{font-size:11px;color:#888;display:block;margin:2px 0}
.shop-price{font-size:13px;color:#e67e22;font-weight:bold}

/* Tasks */
.task-item{display:flex;align-items:center;justify-content:space-between;background:#16213e;padding:14px;border-radius:10px;margin-bottom:8px}
.task-name{font-size:14px;font-weight:bold;display:block}
.task-desc{font-size:11px;color:#888;display:block}
.task-reward{font-size:12px;color:#e67e22;display:block;margin-top:2px}
.task-btn{background:#667eea;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.task-btn.done{background:#444;color:#888}

/* Care */
.care-panel{background:#16213e;border-radius:12px;padding:16px;margin-bottom:12px}
.care-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.care-img{font-size:48px}
.care-name{font-size:16px;font-weight:bold}
.care-power{font-size:12px;color:#aaa}
.status-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.sbar{flex:1;height:8px;background:#333;border-radius:4px;overflow:hidden}
.sfill{height:100%;border-radius:4px;transition:width .3s}
.fill-hunger{background:linear-gradient(90deg,#f39c12,#e67e22)}
.fill-clean{background:linear-gradient(90deg,#3498db,#2980b9)}
.fill-happy{background:linear-gradient(90deg,#2ecc71,#27ae60)}
.care-btns{display:flex;gap:8px;margin-top:10px}
.care-btn{flex:1;padding:10px;background:#667eea;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.care-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.care-pet{width:80px;text-align:center;background:#0f3460;padding:8px;border-radius:8px;cursor:pointer;flex-shrink:0;font-size:11px;-webkit-tap-highlight-color:transparent}
.care-pet.sel{background:#667eea}

/* Select modal */
.select-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:300}
.select-box{background:#16213e;border-radius:16px;padding:16px;text-align:center;width:85%}
.select-box h3{font-size:15px;margin-bottom:10px}
.select-item{padding:10px;background:#0f3460;border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:13px;text-align:left}
.select-item:active{background:#1a3a5c}
.select-cancel{padding:10px;color:#888;font-size:13px;margin-top:6px}

/* Game over / Alerts */
.game-over-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:200}
.game-over-box{background:#16213e;border-radius:16px;padding:30px;text-align:center;width:80%}
.game-over-title{font-size:24px;font-weight:bold;display:block;margin-bottom:10px}
.game-over-sub{font-size:14px;color:#aaa;display:block;margin-bottom:16px}
.game-over-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:12px 30px;border-radius:10px;cursor:pointer;font-size:15px}
</style>
</head>

// ===== HELPERS =====
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function rr(){
  var total=0;for(var k in RARITY)total+=RARITY[k].w;
  var r=Math.random()*total;
  for(var k in RARITY){r-=RARITY[k].w;if(r<=0)return k;}
  return'N';
}
function hp(pet){
  var p=pet.power||0;
  if(pet.equip)for(var i=0;i<SLOTS.length;i++){if(pet.equip[SLOTS[i]])p+=pet.equip[SLOTS[i]].b||0;}
  if(pet.fashion){var f;for(var i=0;i<FASHIONS.length;i++)if(FASHIONS[i].id===pet.fashion){f=FASHIONS[i];break;}if(f)p+=f.pb||0;}
  p=Math.floor(p*(1+((pet.happy||100)-50)*0.004));
  return p;
}
function mkPet(r){
  var pool=[];for(var i=0;i<PETS.length;i++)if(PETS[i].rarity===r)pool.push(PETS[i]);
  var base=pool.length?pool[Math.floor(Math.random()*pool.length)]:PETS[0];
  return{uid:uid(),id:base.id,name:base.name,profession:base.profession,img:base.img,basePower:base.basePower,rarity:r,skill:base.skill,skillDmg:base.skillDmg,power:base.basePower+Math.floor(Math.random()*20),level:1,hunger:100,clean:100,happy:100,equip:{weapon:null,armor:null,accessory:null},fashion:null};
}
function fpets(){
  var ps=ST.pets;
  if(ST.filter==='legend'){ps=ps.filter(function(p){return['G0','S-plus','SSR'].indexOf(p.rarity)>-1;});}
  else if(ST.filter==='elite'){ps=ps.filter(function(p){return['SR','SSR'].indexOf(p.rarity)>-1;});}
  else if(ST.filter==='normal'){ps=ps.filter(function(p){return['R','N'].indexOf(p.rarity)>-1;});}
  return ps;
}
function getWaves(stage){
  var waves=[];
  var count=Math.min(3,1+Math.floor(stage/5));
  for(var w=0;w<count;w++){
    var wave=[];
    var num=2+Math.floor(stage/3)+w;
    for(var i=0;i<num;i++){
      var zi=stage<3?0:stage<6?Math.floor(Math.random()*2):stage<10?Math.floor(Math.random()*4):Math.floor(Math.random()*5);
      if(stage%5===0&&stage>0&&w===count-1&&i===num-1)zi=5;
      var z=ZOMBIE[zi];
      var hpM=1+(stage-1)*0.3;
      var atkM=1+(stage-1)*0.2;
      wave.push({uid:uid(),name:z.name,hp:Math.floor(z.hp*hpM),maxHp:Math.floor(z.hp*hpM),atk:Math.floor(z.atk*atkM),spd:z.spd,x:200+i*28,y:50+(i%3)*55,hit:false,dead:false});
    }
    waves.push(wave);
  }
  return waves;
}
function dropEquip(stage){
  var bonus=Math.min(stage*2,30);
  var roll=Math.random()*100,acc=0,ti=0;
  for(var i=0;i<ETIERS.length;i++){
    var rate=i<2?ETIERS[i].r-bonus/2:i<3?ETIERS[i].r+bonus/4:i<4?ETIERS[i].r+bonus/4:ETIERS[i].r+bonus/6;
    acc+=Math.max(rate,1);
    if(roll<acc){ti=i;break;}
  }
  var t=ETIERS[ti],slot=SLOTS[Math.floor(Math.random()*3)];
  return{uid:uid(),name:PREFIXES[slot][ti],slot:slot,t:t.t,n:t.n,c:t.c,b:t.b+Math.floor(Math.random()*t.b*0.3),stage:stage};
}

      '<button class="task-btn'+(t.c?' done':'')+'" data-act="claimTask" data-id="'+t.id+'" data-r="'+t.r+'"'+(t.c?' disabled':'')+'>'+(t.c?'已领':'领取')+'</button></div>';
  }
  return html;
}

// ===== CARE =====
function renderCare(){
  var sel=ST.selectedCare||(ST.pets.length?ST.pets[0]:null);
  if(!sel)return'<div class="empty">还没有宠物</div>';
  var html='<div class="care-panel">'+
    '<div class="care-header">'+
      '<div class="care-img">'+sel.img+'</div>'+
      '<div><div class="care-name">'+sel.name+'</div><div class="care-power">⚔️'+hp(sel)+' | Lv.'+(sel.level||1)+'</div></div></div>'+
    '<div class="status-row"><span>🍗 饱食</span><div class="sbar"><div class="sfill fill-hunger" style="width:'+(sel.hunger||100)+'%"></div></div><span>'+(sel.hunger||100)+'%</span></div>'+
    '<div class="status-row"><span>🧹 清洁</span><div class="sbar"><div class="sfill fill-clean" style="width:'+(sel.clean||100)+'%"></div></div><span>'+(sel.clean||100)+'%</span></div>'+
    '<div class="status-row"><span>😊 心情</span><div class="sbar"><div class="sfill fill-happy" style="width:'+(sel.happy||100)+'%"></div></div><span>'+(sel.happy||100)+'%</span></div>'+
    '<div class="care-btns">'+
      '<button class="care-btn" data-act="careFeed">🍗 喂食</button>'+
      '<button class="care-btn" data-act="careClean">🧹 清洁</button>'+
      '<button class="care-btn" data-act="carePlay">🎾 玩耍</button></div></div>'+
    '<div class="section-title" style="margin-top:12px">选择宠物</div>'+
    '<div class="care-scroll">';
  for(var i=0;i<ST.pets.length;i++){
    var p=ST.pets[i];
    html+='<div class="care-pet'+(sel&&sel.uid===p.uid?' sel':'')+'" data-act="selCare" data-uid="'+p.uid+'">'+
      '<div style="font-size:28px">'+p.img+'</div><div>'+p.name+'</div></div>';
  }
  return html+'</div>';
}

// ===== EVENT ATTACHMENT (event delegation on #app) =====
function attachEvents(){
  var app=document.getElementById('app');
  if(!app)return;

  // One-time login buttons
  var loginBtn=document.getElementById('loginBtn');
  if(loginBtn){
    loginBtn.onclick=function(){
      ST.loggedIn=true;
      ST.userName='训练师';
      save();
      render();
    };
  }
  var guestBtn=document.getElementById('guestBtn');
  if(guestBtn){
    guestBtn.onclick=function(){
      ST.loggedIn=true;
      ST.userName='游客';
      save();
      render();
    };
  }

  // Tab clicks
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++){
    tabs[i].onclick=(function(tab){
      return function(){
        ST.tab=tab;
        if(ST.dungeonActive)return; // Don't switch tabs during battle
        render();
      };
    })(tabs[i].dataset.tab);
  }

  // Hatch button
  var hatchBtn=document.getElementById('hatchBtn');
  if(hatchBtn){
    hatchBtn.onclick=function(){
      if(ST.pg<100){showAlert('PG币不足！');return;}
      ST.pg-=100;
      var r=rr();
      var pet=mkPet(r);
      pet.rarity=r;
      ST.pets.push(pet);
      save();
      updateHeader();
      hatchBtn.classList.add('shaking');
      setTimeout(function(){
        hatchBtn.classList.remove('shaking');
        _resultPet=pet;
        showResult(pet);
      },400);
    };
  }

  // Start dungeon
  var startBtn=document.getElementById('startBtn');
  if(startBtn){
    startBtn.onclick=function(){
      if(!ST.dungeonPet){showAlert('请先选择出战宠物');return;}
      var pet;for(var i=0;i<ST.pets.length;i++)if(ST.pets[i].uid===ST.dungeonPet){pet=ST.pets[i];break;}
      if(!pet){showAlert('宠物不存在');return;}
      if((pet.hunger||100)<20){showAlert('宠物太饿了，先喂食！');return;}
      _pet=pet;
      _power=hp(pet);
      _waves=getWaves(ST.stage);
      _waveIdx=0;
      _zombies=JSON.parse(JSON.stringify(_waves[0]));
      _skillCd=0;
      _dungeonLog=['第'+ST.stage+'关 - 波次1/'+_waves.length];
      ST.dungeonActive=true;
      ST.petHp=100+Math.floor(_power*0.5);
      ST.petMaxHp=100+Math.floor(_power*0.5);
      ST.petX=40;
      ST.petY=100;
      save();
      render();
      _atkTimer=setInterval(dungeonAttack,1500);
      _zTimer=setInterval(zombieMove,2000);
    };
  }

  // Skill button
  var skillBtn=document.getElementById('skillBtn');
  if(skillBtn){
    skillBtn.onclick=function(){
      if(_skillCd>0||!ST.dungeonActive)return;
      var pet=_pet;
      var dmg=Math.floor(_power*pet.skillDmg*(0.8+Math.random()*0.4));
      _zombies=_zombies.map(function(z){
        if(z.dead)return z;
        var nh=z.hp-dmg;
        return{hp:nh<=0?0:nh,maxHp:z.maxHp,atk:z.atk,spd:z.spd,name:z.name,uid:z.uid,x:z.x,y:z.y,hit:nh<=0?false:true,dead:nh<=0};
      });
      _dungeonLog.push(pet.name+' 释放 '+pet.skill+'！全屏 -'+dmg+'！');
      ST.petX=120;
      _skillCd=5;
      render();
      var cd=setInterval(function(){
        _skillCd--;
        var btn=document.getElementById('skillBtn');
        if(btn)btn.textContent=_skillCd>0?'⏳ 冷却'+_skillCd+'s':'🔥 '+pet.skill;
        if(_skillCd<=0&&btn){btn.disabled=false;btn.textContent='🔥 '+pet.skill;}
        if(_skillCd<=0)clearInterval(cd);
      },1000);
      setTimeout(function(){ST.petX=40;render();},300);
      setTimeout(function(){
        _zombies=_zombies.map(function(z){return{hp:z.hp,maxHp:z.maxHp,atk:z.atk,spd:z.spd,name:z.name,uid:z.uid,x:z.x,y:z.y,hit:false,dead:z.dead};});
        render();
      },350);
      setTimeout(checkWave,600);
    };
  }

  // Close reward
  var closeReward=document.getElementById('closeReward');
  if(closeReward){
    closeReward.onclick=function(){
      _reward=null;
      render();
    };
  }

  // All other actions via delegation
  app.onclick=function(e){
    var el=e.target;
    while(el&&el!==app&&!el.dataset.act)el=el.parentElement;
    if(!el||!el.dataset.act)return;
    var act=el.dataset.act;
    var uid=el.dataset.uid;
    var slot=el.dataset.slot;
    var fid=el.dataset.id;
    var vid=el.dataset.v;
    var rid=el.dataset.id;
    var rr=el.dataset.r;

    switch(act){
      case'filter':ST.filter=vid;render();break;
      case'petDetail':
        var p;for(var i=0;i<ST.pets.length;i++)if(ST.pets[i].uid===uid){p=ST.pets[i];break;}
        if(p)showAlert(p.name+'\n'+RARITY[p.rarity].t+' | '+p.profession+'\n战力：'+hp(p)+'\n技能：'+p.skill+'\nLv.'+(p.level||1));
        break;
      case'selDungeon':ST.dungeonPet=uid;render();break;
      case'equipTab':ST.equipTab=vid;render();break;
      case'equipItem':
        var eq;for(var i=0;i<ST.equip.length;i++)if(ST.equip[i].uid===uid){eq=ST.equip[i];break;}
        if(!eq)break;
        if(!ST.pets.length){showAlert('没有宠物');break;}
        showSelectPet('选择装备到哪个宠物',function(petIdx){
          ST.equip=ST.equip.filter(function(e){return e.uid!==uid;});
          ST.pets[petIdx].equip=ST.pets[petIdx].equip||{weapon:null,armor:null,accessory:null};
          ST.pets[petIdx].equip[eq.slot]=eq;
          save();
          render();
          showAlert('装备成功！');
        });
        break;
      case'unequip':
        var pet;for(var i=0;i<ST.pets.length;i++)if(ST.pets[i].uid===uid){pet=ST.pets[i];break;}
        if(!pet||!pet.equip||!pet.equip[slot])break;
        ST.equip.push(pet.equip[slot]);
        pet.equip[slot]=null;
        save();
        render();
        break;
      case'fashionTab':ST.fashionTab=vid;render();break;
      case'synthFashion':
        var f;for(var i=0;i<FASHIONS.length;i++)if(FASHIONS[i].id===fid){f=FASHIONS[i];break;}
        if(!f)break;
        if((ST.frag[fid]||0)<f.frag){showAlert('碎片不足');break;}
        if(!ST.pets.length){showAlert('没有宠物');break;}
        showSelectPet('选择穿上时装的宠物',function(petIdx){
          ST.frag[fid]=(ST.frag[fid]||0)-f.frag;
          ST.pets[petIdx].fashion=fid;
          if(ST.fash.indexOf(fid)===-1)ST.fash.push(fid);
          save();
          render();
          showAlert('时装合成成功！');
        });
        break;
      case'buy':
        var item;for(var i=0;i<SHOP.length;i++)if(SHOP[i].id===fid){item=SHOP[i];break;}
        if(!item)break;
        if(ST.pg<item.price){showAlert('PG币不足！');break;}
        ST.pg-=item.price;
        save();
        if(item.type==='egg'){
          var r=item.rarity||rr();
          var pet=mkPet(r);pet.rarity=r;
          ST.pets.push(pet);
          save();
          updateHeader();
          _resultPet=pet;
          showResult(pet);
        }else if(item.type==='food'||item.type==='clean'||item.type==='toy'){
          if(!ST.pets.length){ST.pg+=item.price;save();showAlert('没有宠物');render();break;}
          showSelectPet('选择宠物',function(petIdx){
            var p=ST.pets[petIdx];
            if(item.type==='food'){
              p.hunger=Math.min(100,(p.hunger||100)+(item.h||0));
              p.happy=Math.min(100,(p.happy||100)+(item.hp||0));
            }else if(item.type==='clean'){
              p.clean=Math.min(100,(p.clean||100)+(item.c||0));
              p.happy=Math.min(100,(p.happy||100)+(item.hp||0));
            }else if(item.type==='toy'){
              p.happy=Math.min(100,(p.happy||100)+(item.hp||0));
            }
            save();
            render();
            showAlert('使用成功！');
          });
        }else if(item.type==='all'){
          ST.pets=ST.pets.map(function(p){
            var hp2=p.hunger||100,cl=p.clean||100,ha=p.happy||100;
            if(item.ah)hp2=Math.min(100,hp2+item.ah);
            if(item.ac)cl=Math.min(100,cl+item.ac);
            if(item.ahp)ha=Math.min(100,ha+item.ahp);
            return{hunger:hp2,clean:cl,happy:ha,power:p.power,name:p.name,uid:p.uid,img:p.img,rarity:p.rarity,profession:p.profession,skill:p.skill,skillDmg:p.skillDmg,level:p.level,equip:p.equip,fashion:p.fashion,basePower:p.basePower,id:p.id};
          });
          save();
          render();
          showAlert('使用成功！');
        }
        break;
      case'claimTask':
        var tid=parseInt(rid);
        var t;for(var i=0;i<ST.tasks.length;i++)if(ST.tasks[i].id===tid){t=ST.tasks[i];break;}
        if(!t||t.c)break;
        t.c=true;
        ST.pg+=parseInt(rr)||t.r;
        save();
        updateHeader();
        render();
        showAlert('领取成功！+'+t.r+' PG');
        break;
      case'careFeed':
        var sel=ST.selectedCare||(ST.pets.length?ST.pets[0]:null);
        if(!sel)break;
        var p;for(var i=0;i<ST.pets.length;i++)if(ST.pets[i].uid===sel.uid){p=ST.pets[i];break;}
        if(!p)break;
        p.hunger=Math.min(100,(p.hunger||100)+30);
        ST.selectedCare=p;
        save();
        render();
        break;
      case'careClean':
        var sel=ST.selectedCare||(ST.pets.length?ST.pets[0]:null);
        if(!sel)break;
        var p;for(var i=0;i<ST.pets.length;i++)if(ST.pets[i].uid===sel.uid){p=ST.pets[i];break;}
        if(!p)break;
        p.clean=Math.min(100,(p.clean||100)+30);
        ST.selectedCare=p;
        save();
        render();
        break;
      case'carePlay':
        var sel=ST.selectedCare||(ST.pets.length?ST.pets[0]:null);
        if(!sel)break;
        var p;for(var i=0;i<ST.pets.length;i++)if(ST.pets[i].uid===sel.uid){p=ST.pets[i];break;}
        if(!p)break;
        p.happy=Math.min(100,(p.happy||100)+30);
        ST.selectedCare=p;
        save();
        render();
        break;
      case'selCare':
        var p;for(var i=0;i<ST.pets.length;i++)if(ST.pets[i].uid===uid){p=ST.pets[i];break;}
        if(p){ST.selectedCare=p;render();}
        break;
    }
  };
}

function showResult(pet){
  var app=document.getElementById('app');
  var modal=document.createElement('div');
  modal.className='result-modal';
  modal.innerHTML='<div class="result-box">'+
    '<div class="result-name">🎉 获得 '+pet.name+'！</div>'+
    '<div class="result-rarity" style="color:'+RARITY[pet.rarity].c+'">'+RARITY[pet.rarity].t+'</div>'+
    '<div class="result-skill">⚔️ 技能：'+pet.skill+'</div>'+
    '<div class="result-skill">战力：'+pet.power+'</div>'+
    '<button class="result-btn" id="closeResult">收下</button></div>';
  document.body.appendChild(modal);
  document.getElementById('closeResult').onclick=function(){
    document.body.removeChild(modal);
  };
}

function showSelectPet(msg,cb){
  var modal=document.createElement('div');
  modal.className='select-modal';
  var html='<div class="select-box"><h3>'+msg+'</h3>';
  for(var i=0;i<ST.pets.length;i++){
    html+='<div class="select-item" data-idx="'+i+'">'+ST.pets[i].img+' '+ST.pets[i].name+' (Lv.'+(ST.pets[i].level||1)+')</div>';
  }
  html+='<div class="select-cancel" id="selCancel">取消</div></div>';
  modal.innerHTML=html;
  document.body.appendChild(modal);
  var items=modal.querySelectorAll('.select-item');
  for(var i=0;i<items.length;i++){
    items[i].onclick=function(){
      var idx=parseInt(this.dataset.idx);
      document.body.removeChild(modal);
      cb(idx);
    };
  }
  document.getElementById('selCancel').onclick=function(){
    document.body.removeChild(modal);
    render(); // re-render in case state changed
  };
}

function showAlert(msg){
  var modal=document.createElement('div');
  modal.className='select-modal';
  modal.innerHTML='<div class="select-box"><h3 style="word-break:break-all">'+msg.replace(/\n/g,'<br>')+'</h3><div class="select-item" id="alertOk" style="text-align:center;background:#667eea;color:#fff">确定</div></div>';
  document.body.appendChild(modal);
  document.getElementById('alertOk').onclick=function(){
    document.body.removeChild(modal);
  };
}

function updateHeader(){
  var pgEl=document.getElementById('hdr_pg');
  if(pgEl)pgEl.textContent=ST.pg;
}

// ===== DUNGEON LOGIC =====
function dungeonAttack(){
  if(!ST.dungeonActive)return;
  var alive=_zombies.filter(function(z){return!z.dead;});
  if(!alive.length)return;
  var target=alive[Math.floor(Math.random()*alive.length)];
  var dmg=Math.floor(_power*(0.6+Math.random()*0.3));
  target.hp-=dmg;
  target.hit=true;
  _dungeonLog.push((_pet?_pet.name:'宠')+' 攻击 '+target.name+' -'+dmg);
  if(target.hp<=0){target.hp=0;target.dead=true;_dungeonLog.push(target.name+' 被击败！');}
  ST.petX=80;
  render();
  setTimeout(function(){ST.petX=40;render();},250);
  setTimeout(function(){
    _zombies=_zombies.map(function(z){return{hp:z.hp,maxHp:z.maxHp,atk:z.atk,spd:z.spd,name:z.name,uid:z.uid,x:z.x,y:z.y,hit:false,dead:z.dead};});
    render();
  },300);
  setTimeout(checkWave,500);
}

function zombieMove(){
  if(!ST.dungeonActive)return;
  var petHp=ST.petHp;
  var newZ=[];
  for(var i=0;i<_zombies.length;i++){
    var z=_zombies[i];
    if(z.dead){newZ.push(z);continue;}
    var nx=z.x-z.spd*12;
    if(nx<=60){
      petHp-=z.atk;
      _dungeonLog.push(z.name+' 攻击！-'+z.atk);
      newZ.push({hp:z.hp,maxHp:z.maxHp,atk:z.atk,spd:z.spd,name:z.name,uid:z.uid,x:220+Math.random()*30,y:z.y,hit:z.hit,dead:z.dead});
    }else{
      newZ.push({hp:z.hp,maxHp:z.maxHp,atk:z.atk,spd:z.spd,name:z.name,uid:z.uid,x:nx,y:z.y,hit:false,dead:z.dead});
    }
  }
  _zombies=newZ;
  if(petHp<=0){
    petHp=0;
    _dungeonLog.push('宠物倒下了...');
    ST.petHp=0;
    clearInterval(_atkTimer);
    clearInterval(_zTimer);
    ST.dungeonActive=false;
    save();
    render();
    showGameOver('闯关失败，下次再来！');
    return;
  }
  ST.petHp=petHp;
  render();
}

function checkWave(){
  if(!ST.dungeonActive)return;
  if(_zombies.every(function(z){return z.dead;})){
    _waveIdx++;
    if(_waveIdx<_waves.length){
      _zombies=JSON.parse(JSON.stringify(_waves[_waveIdx]));
      _dungeonLog.push('波次'+(1+_waveIdx)+'/'+_waves.length+'！');
      render();
    }else{
      clearInterval(_atkTimer);
      clearInterval(_zTimer);
      ST.dungeonActive=false;
      victory();
    }
  }
}

function victory(){
  var pgR=30+ST.stage*20;
  var eq=dropEquip(ST.stage);
  ST.equip.push(eq);
  var frag=null;
  if(Math.random()<0.2){
    var fi=Math.floor(Math.random()*FASHIONS.length);
    frag=FASHIONS[fi].id;
    ST.frag[frag]=(ST.frag[frag]||0)+1;
  }
  _reward={pg:pgR,equip:eq,frag:frag};
  ST.pg+=pgR;
  ST.stage++;
  // Consume hunger
  ST.pets=ST.pets.map(function(p){
    if(p.uid===_pet.uid)return{hunger:Math.max(0,(p.hunger||100)-15),clean:p.clean,happy:p.happy,power:p.power,name:p.name,uid:p.uid,img:p.img,rarity:p.rarity,profession:p.profession,skill:p.skill,skillDmg:p.skillDmg,level:p.level,equip:p.equip,fashion:p.fashion,basePower:p.basePower,id:p.id};
    return p;
  });
  save();
  render();
}

function showGameOver(msg){
  var modal=document.createElement('div');
  modal.className='game-over-modal';
  modal.innerHTML='<div class="game-over-box">'+
    '<div class="game-over-title">😢 '+msg+'</div>'+
    '<button class="game-over-btn" id="gameOverOk">确定</button></div>';
  document.body.appendChild(modal);
  document.getElementById('gameOverOk').onclick=function(){document.body.removeChild(modal);};
}

// ===== BOOT =====
render();
</script>
