<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻兽契约 - DEMO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 10px; }
        .container { max-width: 100%; margin: 0 auto; }
        @media (min-width: 768px) { .container { max-width: 1200px; margin: 0 auto; } }
        .pet-card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        @media (max-width: 767px) {
            body { padding: 5px; }
            .header { padding: 12px !important; }
            .header h1 { font-size: 18px !important; }
            .tabs { flex-wrap: wrap; gap: 6px !important; }
            .tab { font-size: 12px !important; padding: 8px 4px !important; min-width: calc(25% - 6px); }
            .content { padding: 12px !important; }
            .pet-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; gap: 10px !important; }
            .balances { flex-wrap: wrap; gap: 8px !important; }
            .balance-item { padding: 6px 12px !important; font-size: 13px; }
        }
        /* Dungeon Battle Field */
        .dungeon-field { position: relative; width: 100%; height: 280px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
        .pet-sprite { position: absolute; transition: left 0.25s ease; text-align: center; z-index: 10; }
        .pet-circle { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; box-shadow: 0 4px 12px rgba(102,126,234,0.5); margin: 0 auto; }
        .pet-sprite.atk .pet-circle { transform: scale(1.2); }
        .zombie-sprite { position: absolute; transition: all 0.25s ease; text-align: center; z-index: 5; }
        .zombie-circle { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #6B8E23, #556B2F); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; }
        .zombie-sprite.hit .zombie-circle { background: linear-gradient(135deg, #FF4444, #FF0000) !important; transform: scale(1.2); }
        .zombie-sprite.dead .zombie-circle { opacity: 0.2; transform: rotate(90deg) scale(0.5); }
        .hp-bar { width: 52px; height: 6px; background: #333; border-radius: 3px; margin-top: 2px; overflow: hidden; margin: 2px auto 0; }
        .hp-fill { height: 100%; background: #E74C3C; border-radius: 3px; transition: width 0.2s; }
        .hp-fill.green { background: #2ECC71; }
        .hp-text { font-size: 10px; color: #ccc; text-align: center; display: block; }
        .wave-bar { display: flex; justify-content: space-between; padding: 6px 10px; background: #0f3460; border-radius: 8px; font-size: 12px; color: #aaa; margin-bottom: 8px; }
        .skill-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #f39c12, #e67e22); color: #fff; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; margin-bottom: 8px; }
        .skill-btn:disabled { background: #555; color: #888; }
        .battle-log { max-height: 120px; overflow-y: auto; background: #0f3460; border-radius: 8px; padding: 8px; margin-top: 8px; }
        .log-line { font-size: 11px; color: #888; padding: 2px 0; display: block; }
        .start-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold; }
        /* Reward Modal */
        .reward-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .reward-modal.show { display: flex; }
        .reward-content { background: white; border-radius: 20px; padding: 30px; max-width: 400px; text-align: center; margin: 10px; }
        .reward-title { font-size: 22px; font-weight: bold; display: block; margin-bottom: 12px; }
        .reward-eq { padding: 10px; border-radius: 8px; border: 3px solid; margin: 8px 0; text-align: left; }
        /* Equipment */
        .eq-item { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 8px; }
        .eq-info { flex: 1; }
        .eq-name { font-weight: bold; display: block; }
        .eq-tier { font-size: 12px; color: #666; display: block; }
        .eq-bonus { font-size: 13px; color: #e67e22; font-weight: bold; display: block; }
        .eq-btn { background: #667eea; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .epet { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 8px; }
        .epet-name { font-weight: bold; display: block; margin-bottom: 6px; }
        .epet-slot { padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; border-left: 4px solid; background: #f0f0f0; }
        .legend-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 10px; background: #f8f9fa; border-radius: 8px; margin-top: 10px; font-size: 12px; }
        /* Fashion */
        .fashion-item { display: flex; align-items: center; gap: 10px; background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 8px; }
        .fashion-icon { font-size: 36px; width: 50px; text-align: center; }
        .fashion-info { flex: 1; }
        .fashion-name { font-weight: bold; display: block; font-size: 14px; }
        .fashion-desc { font-size: 11px; color: #888; display: block; }
        .fashion-bonus { font-size: 12px; color: #e67e22; font-weight: bold; display: block; }
        .fashion-frag { font-size: 11px; color: #9B59B6; display: block; }
        .synth-btn { background: #ccc; color: #666; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .synth-btn.ready { background: linear-gradient(135deg, #9B59B6, #8E44AD); color: white; }
        .frag-item { display: flex; justify-content: space-between; padding: 10px 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
        /* Sub tabs */
        .sub-tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .sub-tab { flex: 1; min-width: 80px; text-align: center; padding: 8px; border-radius: 8px; font-size: 13px; background: #f0f0f0; color: #666; cursor: pointer; border: none; }
        .sub-tab.active { background: #667eea; color: white; }
        /* Select pet modal */
        .select-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .select-modal.show { display: flex; }
        .select-content { background: white; border-radius: 16px; padding: 16px; max-width: 400px; width: 90%; text-align: center; max-height: 70vh; overflow-y: auto; }
        .select-item { padding: 10px; background: #f0f0f0; border-radius: 8px; margin-bottom: 6px; cursor: pointer; font-size: 13px; text-align: left; }
        .select-item:hover { background: #667eea; color: white; }
        .select-cancel { padding: 10px; color: #888; font-size: 13px; margin-top: 6px; cursor: pointer; }
        .hint-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 15px; margin: 15px 0; text-align: left; font-size: 13px; }
        .game-over-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .game-over-modal.show { display: flex; }

        .header { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .header h1 { color: #667eea; text-align: center; margin-bottom: 10px; }
        .balances { display: flex; gap: 20px; justify-content: center; margin-top: 15px; }
        .balance-item { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 15px; background: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s; }
        .tab:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .content { background: white; border-radius: 15px; padding: 20px; min-height: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .pet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .pet-card { background: #f8f9fa; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.3s; border: 3px solid transparent; }
        .pet-card:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .pet-card.selected { border-color: #667eea; }
        .pet-card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .pet-card .pet-name { font-weight: bold; margin-bottom: 5px; }
        .pet-card .pet-type { font-size: 12px; color: #666; }
        .pet-card .pet-power { font-size: 14px; color: #667eea; font-weight: bold; }
        .pet-card .pet-hatch-count { font-size: 11px; color: #999; margin-top: 3px; }
        .rarity-G0 { border-left: 5px solid #FFD700; }
        .rarity-S-plus { border-left: 5px solid #FF00FF; }
        .rarity-S { border-left: 5px solid #9B59B6; }
        .rarity-G2 { border-left: 5px solid #3498DB; }
        .rarity-G3 { border-left: 5px solid #2ECC71; }
        .rarity-N { border-left: 5px solid #999; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-gold { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: white; }
        .hatch-area { text-align: center; padding: 20px; }
        .hatch-btn { font-size: 20px; padding: 15px 40px; }
        .result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .result-modal.show { display: flex; }
        .result-content { background: white; border-radius: 20px; padding: 40px; max-width: 500px; text-align: center; animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .result-content h2 { color: #667eea; margin-bottom: 20px; }
        .result-content img { width: 200px; height: 200px; object-fit: contain; margin: 20px 0; }
        .close-btn { margin-top: 20px; }
        .progress-bar { background: #f0f0f0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 20px; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); transition: width 0.3s; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; font-size: 12px; }
        .stat-item { background: #f8f9fa; padding: 5px; border-radius: 5px; }
        .rarity-legend { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; padding: 10px; background: #f8f9fa; border-radius: 10px; }
        .rarity-item { padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .hint-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 15px; margin: 15px 0; text-align: left; }
        .cooldown-timer { color: #e74c3c; font-size: 12px; margin-top: 5px; }
    
        .pet-card .actions { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }

        /* Pet detail modal */
        #petDetailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐾 幻兽契约</h1>
            <p style="text-align: center; color: #666;">DEMO 版本 - 体验完整玩法</p>
            <div class="balances">
                <div class="balance-item">💰 PG币：<span id="pgBalance">10000</span></div>
                <div class="balance-item" id="userStatus" style="cursor:pointer;" onclick="showLoginUI()">👤 未登录</div>
                <div class="balance-item" id="logoutBtn" style="display:none;cursor:pointer;background:#e74c3c;" onclick="doLogout()">🚪 退出</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('collection', event)">🎒 我的宠物</button>
            <button class="tab" onclick="showTab('hatch', event)">🥚 孵化</button>
            <button class="tab" onclick="showTab('dungeon', event)">⚔️ 闯关</button>
            <button class="tab" onclick="showTab('equip', event)">🗡️ 装备</button>
            <button class="tab" onclick="showTab('fashion', event)">👘 时装</button>
            <button class="tab" onclick="showTab('tasks', event)">📋 任务</button>
            <button class="tab" onclick="showTab('shop', event)">🏪 商店</button>
            <button class="tab" onclick="showTab('care', event)">❤️ 养成</button>
            <button class="tab" onclick="showTab('synth', event)">🔬 合成</button>
        </div>

        <div class="content" id="content">
        </div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <h2 id="resultTitle">🎉 孵化成功！</h2>
            <img id="resultImage" src="" alt="">
            <div id="resultInfo"></div>
            <button class="btn btn-primary close-btn" onclick="closeModal()">太棒了！</button>
        </div>
    </div>

    <div class="result-modal" id="petDetailModal">
        <div class="result-content" style="max-width: 600px;">
            <h2 id="detailTitle">🐾 宠物详情</h2>
            <img id="detailImage" src="" alt="" style="width: 150px; height: 150px;">
            <div id="detailInfo" style="text-align: left; margin-top: 20px;"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-primary" onclick="setBattlePet()">⚔️ 出战</button>
                <button class="btn btn-gold" onclick="setSynthesisPet()">🔬 选为合成</button>
                <button class="btn close-btn" onclick="closePetDetail()" style="background: #ccc; color: #333;">关闭</button>
            </div>
        </div>
    </div>

    <div class="reward-modal" id="rewardModal">
        <div class="reward-content">
            <div class="reward-title" id="rewardTitle">🎉 闯关成功！</div>
            <div id="rewardBody"></div>
            <button class="btn btn-primary" onclick="closeReward()" style="margin-top:15px;">收下奖励</button>
        </div>
    </div>

    <div class="select-modal" id="selectPetModal">
        <div class="select-content">
            <h3 id="selectTitle" style="margin-bottom:12px;">选择宠物</h3>
            <div id="selectList"></div>
            <div class="select-cancel" onclick="closeSelectPet()">取消</div>
        </div>
    </div>

    <div class="game-over-modal" id="gameOverModal">
        <div class="reward-content">
            <div class="reward-title" id="gameOverTitle">😢 闯关失败</div>
            <p id="gameOverMsg" style="color:#666;margin:10px 0;">宠物倒下了，下次再来！</p>
            <button class="btn btn-primary" onclick="closeGameOver()">确定</button>
        </div>
    </div>

<div class="result-modal" id="loginModal">
        <div class="result-content" style="max-width: 400px;">
            <h2 id="loginTitle">👤 登录 / 注册</h2>
            <div id="loginForm" style="text-align: left; margin-top: 20px;">
                <p style="margin-bottom: 10px;"><strong>用户名：</strong></p>
                <input type="text" id="usernameInput" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;" placeholder="输入用户名">
                <p style="margin: 15px 0 10px;"><strong>密码：</strong></p>
                <input type="password" id="passwordInput" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;" placeholder="输入密码">
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="doLogin()" style="flex:1;">登录</button>
                    <button class="btn btn-gold" onclick="doRegister()" style="flex:1;">注册</button>
                </div>
                <p style="margin-top: 15px; font-size: 12px; color: #666;">💡 注册赠送 500 PG！</p>
            </div>
            <div id="loggedInInfo" style="display: none; text-align: left; margin-top: 20px;">
                <p style="font-size: 18px;">欢迎回来，<strong id="loggedUsername"></strong>！</p>
                <p style="margin-top: 10px; color: #666;">注册时间：<span id="registerTime"></span></p>
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="closeLoginModal()" style="flex:1;">开始游戏</button>
                    <button class="btn" onclick="doLogout()" style="flex:1; background: #e74c3c; color: white;">退出登录</button>
                </div>
            </div>
        </div>
    </div>

        function getWaves(stage) {
            var waves = [];
            var count = Math.min(3, 1 + Math.floor(stage / 5));
            for (var w = 0; w < count; w++) {
                var wave = [];
                var num = 2 + Math.floor(stage / 3) + w;
                for (var i = 0; i < num; i++) {
                    var zi = stage < 3 ? 0 : stage < 6 ? Math.floor(Math.random() * 2) : stage < 10 ? Math.floor(Math.random() * 4) : Math.floor(Math.random() * 5);
                    if (stage % 5 === 0 && stage > 0 && w === count - 1 && i === num - 1) zi = 5;
                    var z = ZOMBIE[zi];
                    var hpM = 1 + (stage - 1) * 0.3;
                    var atkM = 1 + (stage - 1) * 0.2;
                    wave.push({

                }

            const lastClaim = localStorage.getItem(claimedKey);

            const task = tasks.find(t => t.id === taskId);
            if (task.type === 'daily') {
                if (lastClaim === today) { return; }
            } else {
                if (lastClaim === 'done') { return; }
            }
            gameData.pg += reward;
            localStorage.setItem(claimedKey, task.type === 'daily' ? today : 'done');

            saveGame();
            showTasks(document.getElementById('content'));
        }

                if (lastClaim) {
                    totalDeduct += task.reward;
                    localStorage.removeItem(key);
                }

            if (totalDeduct === 0) { return; }
            if (!confirm('重置将扣回已领取的 ' + totalDeduct + ' PG，确定吗？')) return;

            saveGame();
            showTasks(document.getElementById('content'));
        }

        function dungeonAttack() {
            if (!dungeonState.dungeonActive) return;
            var alive = _zombies.filter(function(z) { return !z.dead; });
            if (!alive.length) return;
            var target = alive[Math.floor(Math.random() * alive.length)];
            var dmg = Math.floor(_dPower * (0.6 + Math.random() * 0.3));
            target.hp -= dmg; target.hit = true;
            _dungeonLog.push((_dPet ? _dPet.name : '') + ' \u653B\u51FB ' + target.name + ' -' + dmg);
            if (target.hp <= 0) { target.hp = 0; target.dead = true; _dungeonLog.push(target.name + ' \u88AB\u51FB\u8D25\uFF01'); }
            _petX = 80;
            var c = document.getElementById('content'); if (c) renderBattleField(c);

        function useSkill() {

            var dmg = Math.floor(_dPower * skillDmg * (0.8 + Math.random() * 0.4));
            _zombies.forEach(function(z) {
                if (z.dead) return;
                z.hp -= dmg;
                if (z.hp <= 0) { z.hp = 0; z.dead = true; }

            _dungeonLog.push(pet.name + ' \u91CA\u653E\u6280\u80FD\uFF01\u5168\u5C4F -' + dmg);

                if (_skillCd <= 0) { clearInterval(cd); if (btn) btn.disabled = false; }

        function zombieMove() {
            if (!dungeonState.dungeonActive) return;

            var newZ = [];
            for (var i = 0; i < _zombies.length; i++) {
                var z = _zombies[i];
                if (z.dead) { newZ.push(z); continue; }
                var nx = z.x - z.spd * 12;
                if (nx <= 60) {
                    petHp -= z.atk;
                    _dungeonLog.push(z.name + ' \u653B\u51FB\uFF01-' + z.atk);
                    newZ.push({ uid: z.uid, name: z.name, hp: z.hp, maxHp: z.maxHp, atk: z.atk, spd: z.spd, x: 200 + Math.random() * 30, y: z.y, hit: false, dead: z.dead });
                } else {
                    z.x = nx; newZ.push(z);
                }
            }
            _zombies = newZ;
            if (petHp <= 0) {
                petHp = 0; _petHp = 0;
                _dungeonLog.push('\u5BA0\u7269\u5012\u4E0B\u4E86...');
                clearInterval(_atkTimer); clearInterval(_zTimer);

            showSelectPet('选择装备到哪个宠物', function(petIdx) {

                        showToast('替换成功！');
                        showTab('equip');
                    });
                } else {
                    dungeonState.equip = dungeonState.equip.filter(function(e) { return e.uid !== eqUid; });
                    gameData.pets[petIdx].equip[eq.slot] = eq;
                    saveGame(); saveDungeonState(); updateBalances();
                    showToast('装备成功！');
                    showTab('equip');
                }
            });
        }
        function doUnequip(pUid, slot) {
            var pet = null;
            for (var i = 0; i < gameData.pets.length; i++) { if (gameData.pets[i].uid === pUid) { pet = gameData.pets[i]; break; } }

            dungeonState.equip.push(pet.equip[slot]);

        // 选择宠物（从孵化页面选择）
        function selectThisPet(idx, evt) {
            selectedPet = gameData.pets[idx];
            document.querySelectorAll('.hatch-pet-card').forEach(c => c.classList.remove('selected'));
            if (evt && evt.target && evt.target.closest) {
                evt.target.closest('.hatch-pet-card').classList.add('selected');

        // 更新孵化按钮状态
        function updateHatchButton() {
            const btn = document.getElementById('hatchBtn');
            const info = document.getElementById('hatchInfo');
            if (!btn || !selectedPet) return;
            
            const config = hatchConfig[selectedPet.rarity];
            const hatchCount = selectedPet.hatchCount || 0;
            const remaining = (config.maxHatch || 0) - hatchCount;
            
            if (selectedPet.rarity === 'G3') {
                btn.disabled = true;
                btn.textContent = '第三代宠物不能孵化';
                return;
            }
            
            if (remaining <= 0) {
                btn.disabled = true;
                btn.textContent = '已达孵化上限';
                return;
            }
            
            const cooldownMs = config.cooldown * 86400000;
            const elapsed = Date.now() - (selectedPet.lastHatchTime || 0);
            if (elapsed < cooldownMs) {
                const remainingMs = cooldownMs - elapsed;
                const days = Math.ceil(remainingMs / 86400000);
                btn.disabled = true;
                btn.textContent = `冷却中 (${days}天后可用)`;
                return;
            }
            
            btn.disabled = gameData.pg < config.costPG;
            btn.textContent = `开始孵化（消耗 ${config.costPG} PG）`;
            
            // 显示孵化信息
            if (info) {
                info.innerHTML = `选择的宠物：<strong>${selectedPet.name}</strong> (${selectedPet.rarity})<br>`;
                info.innerHTML += `剩余孵化次数：<strong>${remaining}</strong> 次<br>`;
                if (selectedPet.rarity === 'G0') {
                    info.innerHTML += `🎯 10% 概率出至尊宠物<br>✅ 20% 概率出传说宠物<br>✅ 70% 概率出第二代宠物`;
                } else if (selectedPet.rarity === 'G2') {
                    info.innerHTML += `🎯 5% 概率出第二代宠物<br>✅ 95% 概率出第三代宠物`;
                }
            }
        }

        // 执行孵化
        function doHatch() {
            if (!selectedPet) return;
            const config = hatchConfig[selectedPet.rarity];
            
            if (gameData.pg < config.costPG) {
                return;
            }
            
            gameData.pg -= config.costPG;
            
            // 更新宠物孵化次数
            selectedPet.hatchCount = (selectedPet.hatchCount || 0) + 1;
            selectedPet.lastHatchTime = Date.now();
            
            // 生成后代
            const roll = Math.random();
            let child;
            let resultType = '';
            
            if (selectedPet.rarity === 'G0') {
                if (roll < 0.1) {
                    // 10% 概率产出至尊宠物（S+级）
                    child = Object.assign({}, petDatabase[Math.floor(Math.random() * petDatabase.length)], {uid: Date.now(), hatchCount: 0, lastHatchTime: 0});
                    child.name = '至尊·' + child.name;
                    child.rarity = 'S+';
                    child.power = 2400 + Math.floor(Math.random() * 300);
                    resultType = 'supreme';
                } else if (roll < 0.3) {
                    // 20% 概率产出传说宠物（S级）
                    child = Object.assign({}, petDatabase[Math.floor(Math.random() * petDatabase.length)], {uid: Date.now(), hatchCount: 0, lastHatchTime: 0});
                    child.name = '传说·' + child.name;
                    child.rarity = 'S';
                    child.power = 1700 + Math.floor(Math.random() * 400);
                    resultType = 'legendary';
                } else {
                    // 70% 概率产出第二代宠物（G2）
                    child = Object.assign({}, petDatabase[Math.floor(Math.random() * petDatabase.length)], {uid: Date.now(), hatchCount: 0, lastHatchTime: 0});
                    child.rarity = 'G2';
                    child.power = 1000 + Math.floor(Math.random() * 600);
                    resultType = 'g2';
                }
            } else if (selectedPet.rarity === 'S+' || selectedPet.rarity === 'S') {
                if (roll < 0.05 && selectedPet.rarity === 'S') {
                    child = Object.assign({}, petDatabase[Math.floor(Math.random() * petDatabase.length)], {uid: Date.now(), hatchCount: 0, lastHatchTime: 0});
                    child.name = '传说·' + child.name;
                    child.rarity = 'S';
                    child.power = 1700 + Math.floor(Math.random() * 400);
                    child = Object.assign({}, petDatabase[Math.floor(Math.random() * petDatabase.length)], {uid: Date.now(), hatchCount: 0, lastHatchTime: 0});
                    child.rarity = 'G3';
                    child.power = 750 + Math.floor(Math.random() * 450);
                    resultType = 'g3';
                }
            } else if (selectedPet.rarity === 'G2') {
                if (roll < 0.05) {
                    child = Object.assign({}, petDatabase[Math.floor(Math.random() * 6)], {uid: Date.now(), hatchCount: 0, lastHatchTime: 0});
                    child.name = '传说·' + child.name;
                    child.rarity = 'S';
                    child.power = 1600 + Math.floor(Math.random() * 300);
                    resultType = 'legendary';
                } else {
                    child = Object.assign({}, petDatabase[Math.floor(Math.random() * petDatabase.length)], {uid: Date.now(), hatchCount: 0, lastHatchTime: 0});
                    child.rarity = 'G3';
                    child.power = 750 + Math.floor(Math.random() * 450);
                    resultType = 'g3';
                }
            }
            
            gameData.pets.push(child);
            gameData.totalHatched += 1;
            updateBalances();
            saveGame();
            showResult(child, resultType);
            
            // 更新按钮状态
            selectedPet = gameData.pets.find(p => p.uid === selectedPet.uid);
            updateHatchButton();
        }

        let detailPetIdx = null;
        function showPetDetail(idx) {

            detailPetIdx = idx;
            const pet = gameData.pets[idx];
            const modal = document.getElementById('petDetailModal');
            const title = document.getElementById('detailTitle');
            const img = document.getElementById('detailImage');
            const info = document.getElementById('detailInfo');
            
            title.textContent = pet.name;
            title.style.color = pet.rarity === 'G0' ? '#FFD700' : pet.rarity === 'S+' ? '#FF00FF' : pet.rarity === 'S' ? '#9B59B6' : '#667eea';
            img.src = 'images/' + pet.img;
            img.onerror = () => { img.src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>'; };
            
            // 计算属性（如果没有则生成，按稀有度差异化）
            let talent, constitution, mana;
            if (pet.talent) {
                talent = pet.talent;
                constitution = pet.constitution;
                mana = pet.mana;
            } else {
                // 根据稀有度生成不同的属性范围
                const attrRanges = {
                    'G0': [80, 120, 80, 120, 60, 100],    // 创世
                    'S+': [60, 100, 60, 100, 40, 80],    // 至尊
                    'S': [50, 90, 50, 90, 30, 60],        // 传说
                    'G2': [40, 70, 40, 70, 20, 40],     // 第二代
                    'G3': [20, 50, 20, 50, 10, 30]    // 第三代
                };
                const range = attrRanges[pet.rarity] || attrRanges['G3'];
                talent = range[0] + Math.floor(Math.random() * (range[1] - range[0]));
                constitution = range[2] + Math.floor(Math.random() * (range[3] - range[2]));
                mana = range[4] + Math.floor(Math.random() * (range[5] - range[4]));
                
                // 保存属性
                pet.talent = talent;
                pet.constitution = constitution;
                pet.mana = mana;
            }

        function startBattle(petUid) {
            var pet = gameData.pets.find(function(p) { return p.uid === petUid; });
            if (!pet) return;

            // 随机选NPC宠物
            var npcPet = petDatabase[Math.floor(Math.random() * petDatabase.length)];
            // 复制并调整NPC宠物属性
            npcPet = JSON.parse(JSON.stringify(npcPet));
            npcPet.power = Math.max(500, pet.power + Math.floor(Math.random() * 600) - 300); // NPC战力接近玩家

            var playerHP = pet.power * 3;
            var npcHP = npcPet.power * 3;

            battleState = { playerPet: pet, npcPet: npcPet, playerHP: playerHP, npcHP: npcHP, maxPlayerHP: playerHP, maxNpcHP: npcHP, log: [], round: 0 };

            // 显示对战区域
            document.getElementById('battleArena').style.display = 'block';
            document.getElementById('playerPetImg').innerHTML = '<img src="' + (('images/' + pet.img) || ('images/' + pet.id + '.png')) + '" style="width:60px;height:60px;object-fit:contain;" onerror="this.style.display=\'none\'">';
            document.getElementById('playerPetName').textContent = pet.name + ' ⚡' + pet.power;
            document.getElementById('npcPetImg').innerHTML = '<img src="images/' + npcPet.id + '.png" style="width:60px;height:60px;object-fit:contain;" onerror="this.style.display=\'none\'">';
            document.getElementById('npcPetName').textContent = '🤖' + npcPet.name + ' ⚡' + npcPet.power;

            addBattleLog('⚔️ 对战开始！' + pet.name + ' VS ' + npcPet.name);
            addBattleLog('--- 第1回合 ---');

            // 延迟开始战斗
            setTimeout(function() { executeBattleTurn(); }, 800);
        }

        function addBattleLog(msg) {
            battleState.log.push(msg);
            var logEl = document.getElementById('battleLog');
            if (logEl) {
                logEl.innerHTML += '<div>' + msg + '</div>';
                logEl.scrollTop = logEl.scrollHeight;
            }
        }

        function updateHPBars() {
            var pPct = Math.max(0, battleState.playerHP / battleState.maxPlayerHP * 100);
            var nPct = Math.max(0, battleState.npcHP / battleState.maxNpcHP * 100);
            var pFill = document.getElementById('playerHPFill');
            var nFill = document.getElementById('npcHPFill');
            var pLabel = document.getElementById('playerHPLabel');
            var nLabel = document.getElementById('npcHPLabel');
            if (pFill) pFill.style.width = pPct + '%';
            if (nFill) nFill.style.width = nPct + '%';
            if (pLabel) pLabel.textContent = 'HP: ' + Math.max(0, Math.ceil(pPct)) + '%';
            if (nLabel) nLabel.textContent = 'HP: ' + Math.max(0, Math.ceil(nPct)) + '%';
        }

        function executeBattleTurn() {
            if (!battleState) return;
            battleState.round++;

            var pet = battleState.playerPet;
            var npc = battleState.npcPet;

            // 玩家攻击
            var playerAtk = Math.floor(pet.power / 5 + Math.random() * pet.power / 3);
            battleState.npcHP -= playerAtk;
            addBattleLog('🗡️ ' + pet.name + ' 攻击，造成 ' + playerAtk + ' 伤害！');
            updateHPBars();

            if (battleState.npcHP <= 0) {
                endBattle('win');
                return;
            }

            // NPC攻击（延迟）
            setTimeout(function() {
                var npcAtk = Math.floor(npc.power / 5 + Math.random() * npc.power / 3);
                battleState.playerHP -= npcAtk;
                addBattleLog('🤖 ' + npc.name + ' 攻击，造成 ' + npcAtk + ' 伤害！');
                updateHPBars();

                if (battleState.playerHP <= 0) {
                    endBattle('lose');
                    return;
                }

                // 下一回合
                if (battleState.round < 20) {
                    addBattleLog('--- 第' + (battleState.round + 1) + '回合 ---');
                    setTimeout(function() { executeBattleTurn(); }, 600);
                } else {
                    // 20回合平局，HP多者胜
                    endBattle(battleState.playerHP >= battleState.npcHP ? 'win' : 'lose');
                }
            }, 500);
        }

    function decayPetStatus() {
        if (!gameData.isLoggedIn) return;
        const now = Date.now();
        gameData.pets.forEach(pet => {
            if (!pet.status) pet.status = { hunger: 80, health: 80, happiness: 80, lastDecay: now };
            const elapsed = (now - pet.status.lastDecay) / 60000; // minutes
            pet.status.hunger = Math.max(0, pet.status.hunger - elapsed * 2);
            pet.status.health = Math.max(0, pet.status.health - elapsed * 0.5);
            pet.status.happiness = Math.max(0, pet.status.happiness - elapsed * 1.5);
            pet.status.lastDecay = now;
        });
        saveGame();
    }

    function useCareItemDirect(type, uid, tier) {
        var items={
            food:[{hunger:30,exp:5,price:20},{hunger:60,exp:15,price:50},{hunger:100,exp:30,price:100}],
            clean:[{health:30,exp:5,price:20},{health:60,exp:15,price:50},{health:100,exp:30,price:100}],
            toy:[{happy:30,exp:5,price:20},{happy:60,exp:15,price:50},{happy:100,exp:30,price:100}]
        };
        var it=items[type][tier];
        if(gameData.pg<it.price){showToast("PG不足！需要"+it.price+" PG");return;}
        gameData.pg-=it.price;
        var pet=gameData.pets.find(function(p){return p.uid===uid;});
        if(!pet){showToast("宠物不存在！");return;}
        if(!pet.status) pet.status={hunger:80,health:80,happiness:80};
        var tn={food:"喂养",clean:"清洁",toy:"玩耍"};
        var sn={food:"饥饿",clean:"健康",toy:"快乐"};
        var sv=type==="food"?it.hunger:type==="clean"?it.health:it.happy;
        if(type==="food") pet.status.hunger=Math.min(100,pet.status.hunger+it.hunger);
        else if(type==="clean") pet.status.health=Math.min(100,pet.status.health+it.health);
        else pet.status.happiness=Math.min(100,pet.status.happiness+it.happy);
        pet.exp=(pet.exp||0)+it.exp;
        checkLevelUp(pet);
        saveGame();updateBalances();
        showToast(tn[type]+"成功！"+sn[type]+"+"+sv);
        closePetStatusModal();
        showCareTab();
    }

    function selectSynthPet(uid) {
        console.log('[DEBUG] selectSynthPet:', uid);
        try {
            const pet = gameData.pets.find(p => p.uid === uid);
            if (!pet) return;

            // If clicking already selected pet, deselect it
            if (synthPet1 === uid) { synthPet1 = null; showTabSynth(); return; }
            if (synthPet2 === uid) { synthPet2 = null; showTabSynth(); return; }

            // Auto-select: if first slot empty, fill it; else if second empty, fill with same profession
            if (!synthPet1) {
                synthPet1 = uid;
                // Auto-filter to same profession for second pick
                synthFilter = pet.profession;
            } else if (!synthPet2) {
                synthPet2 = uid;
            } else {
                // Both filled, reset with new selection as pet1
                synthPet1 = uid;
                synthPet2 = null;
                synthFilter = pet.profession;
            }
            showTabSynth();
        } catch(e) {
            console.error('[ERROR] selectSynthPet:', e);
        }
    }

    function doSynthesis() {
        console.log('[DEBUG] doSynthesis start');
        try {
            if (!synthPet1 || !synthPet2) return showToast('请选择两只宠物！');
            if (gameData.pg < 100) return showToast('PG不足！需覀100 PG');

            const p1 = gameData.pets.find(p => p.uid === synthPet1);
            const p2 = gameData.pets.find(p => p.uid === synthPet2);
            if (!p1 || !p2) return showToast('宠物不存在！');

            const sameProfession = p1.profession === p2.profession;
            // Same profession: 80% upgrade rarity, 20% same; Different: 30% upgrade, 70% downgrade
            const upgradeChance = sameProfession ? 0.8 : 0.3;
            const didUpgrade = Math.random() < upgradeChance;

            const rarityOrder = ['N', 'G3', 'G2', 'S', 'S+', 'G0'];
            let newRarity;
            if (didUpgrade) {
                const idx = rarityOrder.indexOf(p1.rarity);
                newRarity = idx < rarityOrder.length - 1 ? rarityOrder[idx + 1] : 'G0';
            } else {
                newRarity = p1.rarity;
            }

            const newPower = Math.round(Math.max(p1.power, p2.power) * (sameProfession ? 1.5 : 1.2));
            const newLevel = Math.max(p1.level || 1, p2.level || 1) + 1;

            // Remove old pets
            gameData.pets = gameData.pets.filter(p => p.uid !== synthPet1 && p.uid !== synthPet2);
            gameData.pg -= 100;

            // Create new pet - inherit profession from parents
            const newPet = Object.assign({}, p1, {
                uid: Date.now(),
                rarity: newRarity,
                power: newPower,
                level: newLevel,
                exp: 0,
                hatchCount: 0,
                lastHatchTime: 0,
                status: { hunger: 100, health: 100, happiness: 100, lastDecay: Date.now() }
            });

            gameData.pets.push(newPet);
            synthPet1 = null;
            synthPet2 = null;

            saveGame();
            updateBalances();

            // Show result
            const rarityNames = {'N':'普通','G3':'第三代','G2':'第二代','S':'传说','S+':'至尊','G0':'创世'};
            let msg = '🔬 合成成功！';
            msg += '\n新宠物: '+newPet.name+' ('+rarityNames[newRarity]+')';
            msg += '\n战力: '+newPower+' | 等级: Lv.'+newLevel;
            if (didUpgrade) msg += '\n🔥 稀有度提升！';
            showToast(msg);

            showTabSynth();
        } catch(e) {
            console.error('[ERROR] doSynthesis:', e);
            showToast('合成失败，请重试');
        }
    }

        gameData.careItems[type]--;
    } else if (gameData.pg >= 20) {

    }
    var tn = {food:'喂养', clean:'清洁', toy:'玩耍'};
    var sn = {food:'饱食度', clean:'健康', toy:'快乐'};
    if (type === 'food') pet.status.hunger = Math.min(100, (pet.status.hunger||0) + 30);
    if (type === 'clean') pet.status.health = Math.min(100, (pet.status.health||0) + 30);
    if (type === 'toy') pet.status.happiness = Math.min(100, (pet.status.happiness||0) + 30);
    pet.exp = (pet.exp || 0) + 5;
    checkLevelUp(pet);
    saveGame(); updateBalances();
    showSuccessDialog(tn[type] + '成功！', sn[type] + '+30，经验+5');
    setTimeout(function(){ closePetStatusModal(); showPetStatusModal(uid); }, 1500);
}
window.addEventListener('DOMContentLoaded', function() {  init(); });

        // Auto-init
        window.onload = function() { init(); };
        // Fallback: also try DOMContentLoaded
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(init, 0);
        }
        // Direct call at end of script as final fallback
        try { init(); } catch(e) { console.error('init() error:', e); }

function showGameDialog(c) { document.getElementById('gameDialogContent').innerHTML = c; document.getElementById('gameDialog').style.display = 'flex'; }
function closeGameDialog() { document.getElementById('gameDialog').style.display = 'none'; }
function showSuccessDialog(title, detail) {
    var h = '<div style="padding:20px;"><div style="font-size:48px;margin-bottom:15px;">✅</div>';
    h += '<h3 style="color:#27AE60;margin-bottom:10px;">' + title + '</h3>';
    if (detail) h += '<p style="color:#333;font-size:16px;">' + detail + '</p>';
    h += '<button class="btn btn-primary" style="margin-top:20px;padding:10px 40px;" onclick="closeGameDialog()">确定</button></div>';
    showGameDialog(h);
}
